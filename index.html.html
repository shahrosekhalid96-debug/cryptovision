<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoVision AI - Intelligent Crypto Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; padding:20px;}
h1 { text-align:center;}
.container { max-width:1200px; margin:auto;}
.crypto { padding:15px; border-bottom:1px solid #333; cursor:pointer;}
.crypto:hover { background:#1e293b;}
.green{color:#10b981;} .red{color:#ef4444;}
</style>
</head>

<body>
<div class="container">
<h1>🚀 CryptoVision AI</h1>

<div id="list"></div>

<h2 id="title">Select Crypto</h2>
<canvas id="chart" height="100"></canvas>

<h2>AI Signal: <span id="signal">-</span></h2>
<h3>Action: <span id="action">-</span></h3>

<h3>Predictions</h3>
<div id="predictions"></div>

</div>

<script>
// ================= FETCH =================
let state={cryptos:[],selected:null,chart:null};

async function load(){
 const res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd");
 state.cryptos=await res.json();
 renderList();
}

function renderList(){
 const list=document.getElementById("list");
 list.innerHTML="";
 state.cryptos.slice(0,20).forEach(c=>{
  const div=document.createElement("div");
  div.className="crypto";
  div.innerHTML=`${c.name} (${c.symbol}) - $${c.current_price}
  <span class="${c.price_change_percentage_24h>0?'green':'red'}">
  ${c.price_change_percentage_24h.toFixed(2)}%</span>`;
  div.onclick=()=>select(c);
  list.appendChild(div);
 });
}

// ================= ANALYSIS =================
function normalize(arr){
 const vals=arr.map(p=>p[1]);
 const min=Math.min(...vals), max=Math.max(...vals);
 return arr.map(p=>[p[0],(p[1]-min)/(max-min)]);
}

function denorm(v,arr){
 const vals=arr.map(p=>p[1]);
 const min=Math.min(...vals), max=Math.max(...vals);
 return v*(max-min)+min;
}

function predict(prices){
 const norm=normalize(prices).map(p=>p[1]);
 let diffs=[];
 for(let i=1;i<norm.length;i++){
  diffs.push(norm[i]-norm[i-1]);
 }

 let avg=diffs.reduce((a,b)=>a+b,0)/diffs.length;
 let variance=diffs.reduce((s,d)=>s+(d-avg)**2,0)/diffs.length;
 let vol=Math.sqrt(variance);

 let last=norm.at(-1);

 function p(step){
  let val=last+(avg*step);
  val=Math.max(0,Math.min(1,val));
  return denorm(val,prices);
 }

 return {
  p24:p(1),
  p7:p(7),
  p30:p(30),
  confidence:Math.max(40,90-vol*1000)
 };
}

// ================= SIGNAL =================
function signal(prices){
 let score=0;

 let last=prices.at(-1)[1];
 let prev=prices.at(-2)[1];

 if(last>prev) score+=2;
 else score-=2;

 let trend=prices.slice(-10).reduce((a,b)=>a+b[1],0)/10;
 if(last>trend) score+=2; else score-=2;

 if(score>=3) return ["Strong Buy","BUY"];
 if(score>=1) return ["Buy","ACCUMULATE"];
 if(score<=-3) return ["Strong Sell","SELL"];
 if(score<=-1) return ["Sell","REDUCE"];
 return ["Neutral","HOLD"];
}

// ================= SELECT =================
async function select(c){
 state.selected=c;

 document.getElementById("title").innerText=c.name;

 const res=await fetch(`https://api.coingecko.com/api/v3/coins/${c.id}/market_chart?vs_currency=usd&days=30`);
 const data=await res.json();

 let prices=data.prices;

 renderChart(prices);

 let s=signal(prices);
 document.getElementById("signal").innerText=s[0];
 document.getElementById("action").innerText=s[1];

 let pred=predict(prices);

 document.getElementById("predictions").innerHTML=`
  24h: $${pred.p24.toFixed(2)} <br>
  7d: $${pred.p7.toFixed(2)} <br>
  30d: $${pred.p30.toFixed(2)} <br>
  Confidence: ${pred.confidence.toFixed(0)}%
 `;
}

// ================= CHART =================
function renderChart(prices){
 const ctx=document.getElementById("chart");

 if(state.chart) state.chart.destroy();

 state.chart=new Chart(ctx,{
  type:"line",
  data:{
   labels:prices.map(p=>new Date(p[0])),
   datasets:[{
    data:prices.map(p=>p[1]),
    borderColor:"#0ea5e9"
   }]
  }
 });
}

load();
</script>
</body>
</html>
